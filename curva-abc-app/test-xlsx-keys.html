<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste XLSX - Nomes de Colunas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <h1>Teste de Leitura de Colunas XLSX</h1>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div id="output"></div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const data = event.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                
                const output = document.getElementById('output');
                
                if (jsonData.length > 0) {
                    const firstRow = jsonData[0];
                    
                    let html = '<h2>Primeira Linha:</h2>';
                    html += '<pre>' + JSON.stringify(firstRow, null, 2) + '</pre>';
                    
                    html += '<h2>Chaves Disponíveis:</h2><ul>';
                    Object.keys(firstRow).forEach(key => {
                        html += `<li><strong>"${key}"</strong> (código char: `;
                        for (let i = 0; i < key.length; i++) {
                            html += key.charCodeAt(i) + ' ';
                        }
                        html += `) = ${firstRow[key]}</li>`;
                    });
                    html += '</ul>';
                    
                    html += '<h2>Testes de Acesso:</h2><ul>';
                    const tests = [
                        'Valor Unitário',
                        'Valor Unitario',
                        'ValorUnitario',
                        'Quantidade',
                        'quantidade'
                    ];
                    tests.forEach(test => {
                        html += `<li><code>row["${test}"]</code> = ${firstRow[test]}</li>`;
                    });
                    html += '</ul>';
                    
                    output.innerHTML = html;
                }
            };
            
            reader.readAsBinaryString(file);
        });
    </script>
</body>
</html>
