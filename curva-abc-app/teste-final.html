<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste Final - Curva ABC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        .info { background-color: #f0f0f0; padding: 10px; margin: 10px 0; }
        .error { background-color: #ffebee; color: red; }
        .success { background-color: #e8f5e9; color: green; }
    </style>
</head>
<body>
    <h1>🔍 Teste Final - Leitura de Valores</h1>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div id="output"></div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const output = document.getElementById('output');
                let html = '';
                
                try {
                    const data = event.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);
                    
                    html += '<div class="info success"><h2>✅ Arquivo lido com sucesso!</h2></div>';
                    
                    if (jsonData.length > 0) {
                        const firstRow = jsonData[0];
                        
                        html += '<div class="info"><h3>🔑 Chaves encontradas:</h3><ul>';
                        Object.keys(firstRow).forEach(key => {
                            html += `<li><strong>"${key}"</strong> = ${firstRow[key]}</li>`;
                        });
                        html += '</ul></div>';
                        
                        // Processar produtos
                        html += '<div class="info"><h3>🧪 Processamento:</h3>';
                        const produtos = jsonData.map((row, index) => {
                            const codigo = row['Codigo'] || row['Código'] || '';
                            const descricao = row['Descricao'] || row['Descrição'] || '';
                            const quantidade = parseFloat(row['Quantidade'] || 0);
                            const valorUnitario = parseFloat(row['Valor Unitario'] || row['Valor Unitário'] || 0);
                            const valorTotal = quantidade * valorUnitario;
                            
                            if (index === 0) {
                                html += `<p><strong>Primeiro produto:</strong></p>`;
                                html += `<p>row['Codigo'] = ${row['Codigo']}</p>`;
                                html += `<p>row['Descricao'] = ${row['Descricao']}</p>`;
                                html += `<p>row['Quantidade'] = ${row['Quantidade']}</p>`;
                                html += `<p>row['Valor Unitario'] = ${row['Valor Unitario']}</p>`;
                                html += `<p class="${valorUnitario > 0 ? 'success' : 'error'}">valorUnitario final = ${valorUnitario}</p>`;
                                html += `<p class="${valorTotal > 0 ? 'success' : 'error'}">valorTotal final = ${valorTotal}</p>`;
                            }
                            
                            return {
                                codigo,
                                descricao,
                                quantidade,
                                valorUnitario,
                                valorTotal
                            };
                        });
                        html += '</div>';
                        
                        // Tabela
                        html += '<h3>📊 Tabela de Resultados:</h3>';
                        html += '<table><thead><tr>';
                        html += '<th>Código</th><th>Descrição</th><th>Qtd</th>';
                        html += '<th style="background-color: green;">Valor Unit.</th>';
                        html += '<th style="background-color: red;">Valor Total</th>';
                        html += '</tr></thead><tbody>';
                        
                        produtos.slice(0, 10).forEach(p => {
                            html += '<tr>';
                            html += `<td>${p.codigo}</td>`;
                            html += `<td>${p.descricao}</td>`;
                            html += `<td>${p.quantidade}</td>`;
                            html += `<td style="background-color: #90EE90;"><strong>${p.valorUnitario ? 'R$ ' + p.valorUnitario.toLocaleString('pt-BR', {minimumFractionDigits: 2}) : 'R$ 0,00'}</strong></td>`;
                            html += `<td style="background-color: #FFB6C1;"><strong>${p.valorTotal ? 'R$ ' + p.valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2}) : 'R$ 0,00'}</strong></td>`;
                            html += '</tr>';
                        });
                        
                        html += '</tbody></table>';
                    }
                    
                } catch (error) {
                    html += `<div class="info error"><h2>❌ Erro: ${error.message}</h2></div>`;
                }
                
                output.innerHTML = html;
            };
            
            reader.readAsBinaryString(file);
        });
    </script>
</body>
</html>
