<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Simples - Tabela Curva ABC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            padding: 50px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        .upload-area p {
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            padding: 20px;
            border-radius: 8px;
            color: white;
            text-align: center;
        }
        .stat-card.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .stat-card.yellow { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card.red { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .stat-card h3 { font-size: 14px; margin-bottom: 10px; opacity: 0.9; }
        .stat-card .value { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .stat-card .detail { font-size: 12px; opacity: 0.8; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 10px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        th.number, td.number { text-align: right; }
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
        }
        tr:hover {
            background: #f8f9ff;
        }
        .classe-A { background: #d4edda !important; }
        .classe-B { background: #fff3cd !important; }
        .classe-C { background: #f8d7da !important; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 11px;
        }
        .badge-A { background: #28a745; color: white; }
        .badge-B { background: #ffc107; color: #333; }
        .badge-C { background: #dc3545; color: white; }
        .console-log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
            white-space: pre-wrap;
        }
        .console-log .success { color: #4ec9b0; }
        .console-log .info { color: #569cd6; }
        .console-log .warn { color: #dcdcaa; }
        .console-log .error { color: #f48771; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Teste de Tabela - Curva ABC</h1>
        <p class="subtitle">Verificação de Valor Unit. e Valor Total</p>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p>📁 Clique aqui para selecionar planilha-teste-estoque.xlsx</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
        </div>
        
        <div id="console" class="console-log" style="display:none;"></div>
        <div id="stats"></div>
        <div id="resultado"></div>
    </div>

    <script>
        const consoleDiv = document.getElementById('console');
        
        function log(message, type = 'info') {
            consoleDiv.style.display = 'block';
            const span = document.createElement('span');
            span.className = type;
            span.textContent = message + '\n';
            consoleDiv.appendChild(span);
            console.log(message);
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            consoleDiv.innerHTML = '';
            document.getElementById('stats').innerHTML = '';
            document.getElementById('resultado').innerHTML = '';
            
            log('📁 Arquivo: ' + file.name, 'success');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = e.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(sheet);
                    
                    log('📊 Total de linhas: ' + jsonData.length, 'info');
                    log('🔑 Colunas: ' + Object.keys(jsonData[0]).join(', '), 'info');
                    
                    // Processar produtos
                    const produtos = jsonData.map((row, i) => {
                        const quantidade = parseFloat(row['Quantidade'] || 0);
                        const valorUnitario = parseFloat(row['Valor Unitário'] || 0);
                        const valorTotal = quantidade * valorUnitario;
                        
                        if (i < 3) {
                            log(`\n📦 Produto ${i+1}:`, 'warn');
                            log(`   Código: ${row['Código']}`, 'info');
                            log(`   Quantidade: ${quantidade}`, 'info');
                            log(`   Valor Unitário: ${valorUnitario}`, 'success');
                            log(`   Valor Total: ${valorTotal}`, 'success');
                        }
                        
                        return {
                            codigo: row['Código'],
                            descricao: row['Descrição'],
                            quantidade: quantidade,
                            valorUnitario: valorUnitario,
                            valorTotal: valorTotal
                        };
                    });
                    
                    // Ordenar e calcular percentuais
                    produtos.sort((a, b) => b.valorTotal - a.valorTotal);
                    const valorTotal = produtos.reduce((sum, p) => sum + p.valorTotal, 0);
                    
                    let acumulado = 0;
                    produtos.forEach(p => {
                        p.percentualValor = (p.valorTotal / valorTotal) * 100;
                        const acumAnterior = acumulado;
                        acumulado += p.percentualValor;
                        p.percentualAcumulado = acumulado;
                        
                        if (acumAnterior < 80) p.classe = 'A';
                        else if (acumAnterior < 95) p.classe = 'B';
                        else p.classe = 'C';
                    });
                    
                    log('\n✅ Processamento concluído!', 'success');
                    log(`💰 Valor total: R$ ${valorTotal.toLocaleString('pt-BR')}`, 'success');
                    
                    // Exibir estatísticas
                    const classeA = produtos.filter(p => p.classe === 'A');
                    const classeB = produtos.filter(p => p.classe === 'B');
                    const classeC = produtos.filter(p => p.classe === 'C');
                    
                    document.getElementById('stats').innerHTML = `
                        <div class="stat-card green">
                            <h3>Classe A</h3>
                            <div class="value">${classeA.length}</div>
                            <div class="detail">produtos</div>
                        </div>
                        <div class="stat-card yellow">
                            <h3>Classe B</h3>
                            <div class="value">${classeB.length}</div>
                            <div class="detail">produtos</div>
                        </div>
                        <div class="stat-card red">
                            <h3>Classe C</h3>
                            <div class="value">${classeC.length}</div>
                            <div class="detail">produtos</div>
                        </div>
                    `;
                    
                    // Exibir tabela
                    let html = '<table><thead><tr>';
                    html += '<th>Código</th><th>Descrição</th><th class="number">Qtd</th>';
                    html += '<th class="number">Valor Unit.</th><th class="number">Valor Total</th>';
                    html += '<th class="number">% Valor</th><th class="number">% Acum.</th><th>Classe</th>';
                    html += '</tr></thead><tbody>';
                    
                    produtos.forEach(p => {
                        html += `<tr class="classe-${p.classe}">`;
                        html += `<td>${p.codigo}</td>`;
                        html += `<td>${p.descricao}</td>`;
                        html += `<td class="number">${p.quantidade}</td>`;
                        html += `<td class="number">R$ ${p.valorUnitario.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>`;
                        html += `<td class="number">R$ ${p.valorTotal.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>`;
                        html += `<td class="number">${p.percentualValor.toFixed(2)}%</td>`;
                        html += `<td class="number">${p.percentualAcumulado.toFixed(2)}%</td>`;
                        html += `<td><span class="badge badge-${p.classe}">${p.classe}</span></td>`;
                        html += '</tr>';
                    });
                    
                    html += '</tbody></table>';
                    document.getElementById('resultado').innerHTML = html;
                    
                } catch (error) {
                    log('❌ Erro: ' + error.message, 'error');
                }
            };
            
            reader.readAsBinaryString(file);
        });
    </script>
</body>
</html>
