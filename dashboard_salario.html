<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Caixa Salário 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
  header {
    background: linear-gradient(135deg, #003d82, #0066cc);
    color: white; padding: 16px 20px;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px;
  }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  header .sub { font-size: 0.8rem; opacity: 0.75; margin-top: 3px; }
  .badge {
    background: rgba(255,255,255,0.15); border-radius: 20px;
    padding: 6px 14px; font-size: 0.75rem; text-align: right;
  }
  .badge strong { display: block; font-size: 0.88rem; }
  #btnAtualizar {
    background: #fff; color: #003d82; border: none; border-radius: 8px;
    padding: 10px 18px; font-size: 0.88rem; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: opacity .2s; white-space: nowrap;
  }
  #btnAtualizar:hover { opacity: 0.85; }
  #btnAtualizar:disabled { opacity: 0.5; cursor: not-allowed; }
  #msgAtualizar { font-size: 0.75rem; margin-top: 4px; min-height: 16px; }
  .container { padding: 16px; max-width: 1100px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .card {
    background: white; border-radius: 10px; padding: 16px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-left: 5px solid #ccc;
  }
  .card.green { border-left-color: #28a745; }
  .card.red   { border-left-color: #dc3545; }
  .card.blue  { border-left-color: #0066cc; }
  .card label { font-size: 0.72rem; text-transform: uppercase; color: #888; letter-spacing: 0.5px; }
  .card .value { font-size: 1.4rem; font-weight: 700; margin-top: 4px; }
  .card.green .value { color: #28a745; }
  .card.red   .value { color: #dc3545; }
  .card.blue  .value { color: #0066cc; }
  .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 16px; }
  .chart-box {
    background: white; border-radius: 10px; padding: 16px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .chart-box h2 { font-size: 0.88rem; color: #555; margin-bottom: 12px; font-weight: 600; }
  .table-wrap { overflow-x: auto; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  table { width: 100%; border-collapse: collapse; background: white; min-width: 360px; }
  thead { background: #003d82; color: white; }
  th { padding: 11px 14px; text-align: left; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
  td { padding: 10px 14px; font-size: 0.84rem; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
  tbody tr:hover { background: #f7f9fc; }
  .pos  { color: #28a745; font-weight: 600; }
  .neg  { color: #dc3545; font-weight: 600; }
  .zero { color: #aaa; }
  .section-title { font-size: 0.82rem; color: #888; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
  #loading { text-align: center; padding: 60px; color: #888; font-size: 1rem; }
  #error   { text-align: center; padding: 40px; color: #dc3545; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    header h1 { font-size: 1rem; }
    .header-right { width: 100%; display: flex; justify-content: space-between; align-items: center; }
    .badge { display: none; }
    .cards { grid-template-columns: 1fr; gap: 10px; }
    .card .value { font-size: 1.25rem; }
    .charts { grid-template-columns: 1fr; }
    .container { padding: 12px; }
    th, td { padding: 9px 10px; font-size: 0.78rem; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Dashboard Caixa &mdash; Sal&aacute;rios 2026</h1>
    <div class="sub">Controle de Entradas, Sal&aacute;rios Pagos e Saldo</div>
  </div>
  <div class="header-right">
    <div class="badge">
      Atualizado em<br><strong id="tsAtualizado">...</strong>
    </div>
    <div style="text-align:right">
      <button id="btnAtualizar" onclick="atualizarDados()">&#8635; Atualizar Dados</button>
      <div id="msgAtualizar" style="color:#cce5ff"></div>
    </div>
  </div>
</header>
<div class="container">
  <div id="loading">Carregando dados...</div>
  <div id="error" style="display:none"></div>
  <div id="content" style="display:none">
    <div class="cards">
      <div class="card green">
        <label>Total Entradas</label>
        <div class="value" id="cardEntradas">-</div>
      </div>
      <div class="card red">
        <label>Total Sal&aacute;rios Pagos</label>
        <div class="value" id="cardSalarios">-</div>
      </div>
      <div class="card blue">
        <label>Saldo Atual</label>
        <div class="value" id="cardSaldo">-</div>
      </div>
    </div>
    <div class="charts">
      <div class="chart-box">
        <h2>Entradas x Sal&aacute;rios por M&ecirc;s</h2>
        <canvas id="barChart" height="120"></canvas>
      </div>
      <div class="chart-box">
        <h2>Saldo ao Longo do Ano</h2>
        <canvas id="lineChart" height="120"></canvas>
      </div>
    </div>
    <p class="section-title">Detalhamento Mensal</p>
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>M&ecirc;s</th>
          <th>Entradas (R$)</th>
          <th>Sal&aacute;rios Pagos (R$)</th>
          <th>Saldo Caixa (R$)</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    </div>
  </div>
</div>
<script>
const fmtVal = v => (v < 0 ? '-\u00a0' : '') + 'R$\u00a0' + Math.abs(v).toLocaleString('pt-BR', {minimumFractionDigits: 2});
let barInst = null, lineInst = null;

function render(d) {
  document.getElementById('tsAtualizado').textContent = d.atualizado;
  document.getElementById('cardEntradas').textContent = fmtVal(d.total_entradas);
  document.getElementById('cardSalarios').textContent = fmtVal(d.total_salarios);
  document.getElementById('cardSaldo').textContent    = fmtVal(d.saldo_atual);

  const rows = d.dados;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  rows.forEach(r => {
    const cls = r.saldo > 0 ? 'pos' : r.saldo < 0 ? 'neg' : 'zero';
    tbody.innerHTML += `<tr>
      <td><strong>${r.mes}</strong></td>
      <td>${r.entradas > 0 ? '<span class="pos">' + fmtVal(r.entradas) + '</span>' : '<span class="zero">-</span>'}</td>
      <td>${r.salarios > 0 ? '<span class="neg">' + fmtVal(r.salarios) + '</span>' : '<span class="zero">-</span>'}</td>
      <td><span class="${cls}">${r.saldo !== 0 ? fmtVal(r.saldo) : '-'}</span></td>
    </tr>`;
  });

  if (barInst) barInst.destroy();
  barInst = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: rows.map(r => r.mes),
      datasets: [
        { label: 'Entradas',       data: rows.map(r => r.entradas), backgroundColor: '#28a74599', borderColor: '#28a745', borderWidth: 1 },
        { label: 'Salarios Pagos', data: rows.map(r => r.salarios), backgroundColor: '#dc354599', borderColor: '#dc3545', borderWidth: 1 },
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'top' } },
      scales: { y: { ticks: { callback: v => 'R$ ' + v.toLocaleString('pt-BR') } } } }
  });

  if (lineInst) lineInst.destroy();
  lineInst = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels: rows.map(r => r.mes),
      datasets: [{
        label: 'Saldo Caixa', data: rows.map(r => r.saldo),
        borderColor: '#0066cc', backgroundColor: '#0066cc22',
        fill: true, tension: 0.3, pointRadius: 4,
        pointBackgroundColor: rows.map(r => r.saldo >= 0 ? '#0066cc' : '#dc3545'),
      }]
    },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: v => 'R$ ' + v.toLocaleString('pt-BR') } } } }
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display  = 'block';
}

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    render(await res.json());
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display   = 'block';
    document.getElementById('error').textContent     = 'Erro ao carregar dados: ' + e.message;
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);

async function atualizarDados() {
  const btn = document.getElementById('btnAtualizar');
  const msg = document.getElementById('msgAtualizar');
  btn.disabled = true;
  btn.textContent = '⏳ Atualizando...';
  msg.textContent = '';
  try {
    const res = await fetch('http://localhost:5050/atualizar');
    const d = await res.json();
    if (d.ok) {
      msg.textContent = '✔ ' + d.msg;
      await loadData();
    } else {
      msg.textContent = '✖ ' + d.msg;
    }
  } catch(e) {
    msg.textContent = '✖ Servidor local nao encontrado. Rode: python servidor.py';
  }
  btn.disabled = false;
  btn.innerHTML = '&#8635; Atualizar Dados';
}
</script>
</body>
</html>
